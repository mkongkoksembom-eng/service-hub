upstream grafana              { server grafana:3000; }
upstream user_service         { server user_service:8001; }
upstream catalog_service      { server catalog_service:8002; }
upstream booking_service      { server booking_service:8003; }
upstream review_service       { server review_service:8005; }
upstream notification_service { server notification_service:8006; }
upstream chat_service         { server chat_service:8007; }
upstream location_service     { server location_service:8008; }
upstream job_service          { server job_service:8009; }
upstream frontend             { server frontend:80; }

server {
    listen 80;
    server_name _;

    client_max_body_size 30M;

    # ── API routing ───────────────────────────────────────────────────────────

    location /grafana/ {
        proxy_pass         http://grafana;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        proxy_pass         http://user_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path  / /;
    }

    location /api/services/ {
        proxy_pass         http://catalog_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/bookings/ {
        proxy_pass         http://booking_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/reviews/ {
        proxy_pass         http://review_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/notifications/ {
        proxy_pass         http://notification_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/chat/ {
        proxy_pass         http://chat_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/location/ {
        proxy_pass         http://location_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/jobs/ {
        proxy_pass         http://job_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Chat media files ─────────────────────────────────────────────────────

    location /media/ {
        alias /srv/media/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────

    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

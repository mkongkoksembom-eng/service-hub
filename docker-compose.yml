version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Shared env blocks (YAML anchors)
# ─────────────────────────────────────────────────────────────────────────────
x-db-env: &db-env
  DB_HOST: db
  DB_PORT: "5432"
  DB_USER: postgres
  DB_PASSWORD: "${POSTGRES_PASSWORD}"

x-common-env: &common-env
  SECRET_KEY: "${SECRET_KEY}"
  DEBUG: "0"
  ENABLE_SSL: "${ENABLE_SSL:-0}"
  ALLOWED_HOSTS: "*"
  INTERNAL_API_KEY: "${INTERNAL_API_KEY}"
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost}"

x-service-urls: &service-urls
  USER_SERVICE_URL: "http://user_service:8001"
  CATALOG_SERVICE_URL: "http://catalog_service:8002"
  BOOKING_SERVICE_URL: "http://booking_service:8003"
  REVIEW_SERVICE_URL: "http://review_service:8005"
  NOTIFICATION_SERVICE_URL: "http://notification_service:8006"
  CHAT_SERVICE_URL: "http://chat_service:8007"
  LOCATION_SERVICE_URL: "http://location_service:8008"
  JOB_SERVICE_URL: "http://job_service:8009"

x-celery-env: &celery-env
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"

x-email-env: &email-env
  EMAIL_HOST: "${EMAIL_HOST}"
  EMAIL_PORT: "${EMAIL_PORT:-587}"
  EMAIL_HOST_USER: "${EMAIL_HOST_USER}"
  EMAIL_HOST_PASSWORD: "${EMAIL_HOST_PASSWORD}"
  DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL}"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_databases.sql:/docker-entrypoint-initdb.d/init_databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - chat_media:/srv/media:ro
    depends_on:
      - user_service
      - catalog_service
      - booking_service
      - review_service
      - notification_service
      - chat_service
      - location_service
      - job_service
      - frontend

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  # ── Application Services ────────────────────────────────────────────────────

  user_service:
    build:
      context: ./services
      dockerfile: user_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls, *email-env]
      DB_NAME: sh_users
      REDIS_CACHE_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  user_service_celery:
    build:
      context: ./services
      dockerfile: user_service/Dockerfile
    restart: unless-stopped
    command: celery -A config.celery worker -l info -Q user_service -c 2
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls, *email-env]
      DB_NAME: sh_users
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  catalog_service:
    build:
      context: ./services
      dockerfile: catalog_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *service-urls]
      DB_NAME: sh_catalog
      REDIS_CACHE_URL: "redis://redis:6379/2"
    depends_on:
      db:
        condition: service_healthy

  booking_service:
    build:
      context: ./services
      dockerfile: booking_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *service-urls]
      DB_NAME: sh_bookings
      REDIS_CACHE_URL: "redis://redis:6379/3"
    depends_on:
      db:
        condition: service_healthy

  review_service:
    build:
      context: ./services
      dockerfile: review_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *service-urls]
      DB_NAME: sh_reviews
    depends_on:
      db:
        condition: service_healthy

  notification_service:
    build:
      context: ./services
      dockerfile: notification_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls, *email-env]
      DB_NAME: sh_notifications
      REDIS_CACHE_URL: "redis://redis:6379/6"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification_service_celery:
    build:
      context: ./services
      dockerfile: notification_service/Dockerfile
    restart: unless-stopped
    command: celery -A config.celery worker -l info -Q notification_service -c 2
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls, *email-env]
      DB_NAME: sh_notifications
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat_service:
    build:
      context: ./services
      dockerfile: chat_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *service-urls]
      DB_NAME: sh_chat
      REDIS_CACHE_URL: "redis://redis:6379/7"
      MEDIA_ROOT: /app/media
    volumes:
      - chat_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  location_service:
    build:
      context: ./services
      dockerfile: location_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *service-urls]
      DB_NAME: sh_location
    depends_on:
      db:
        condition: service_healthy

  job_service:
    build:
      context: ./services
      dockerfile: job_service/Dockerfile
    restart: unless-stopped
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls]
      DB_NAME: sh_jobs
      JOB_NOTIFICATION_PROVIDER_LIMIT: "${JOB_NOTIFICATION_PROVIDER_LIMIT:-0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  job_service_celery:
    build:
      context: ./services
      dockerfile: job_service/Dockerfile
    restart: unless-stopped
    # -B runs beat inside the same worker process — fine for a single periodic task
    command: celery -A config.celery worker -B -l info -Q job_service -c 1
    environment:
      <<: [*common-env, *db-env, *celery-env, *service-urls]
      DB_NAME: sh_jobs
      JOB_NOTIFICATION_PROVIDER_LIMIT: "${JOB_NOTIFICATION_PROVIDER_LIMIT:-0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Monitoring ──────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "http://69.62.105.92/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
    volumes:
      - grafana_data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  node_exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

volumes:
  pg_data:
  redis_data:
  chat_media:
  prometheus_data:
  grafana_data:

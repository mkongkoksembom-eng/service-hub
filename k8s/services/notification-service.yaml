apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: service-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: YOUR_REGISTRY/service-hub-notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: service-hub-config
            - secretRef:
                name: service-hub-secrets
          env:
            - name: DB_NAME
              value: sh_notifications
            - name: REDIS_CACHE_URL
              value: redis://redis:6379/6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: service-hub
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-celery
  namespace: service-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service-celery
  template:
    metadata:
      labels:
        app: notification-service-celery
    spec:
      containers:
        - name: celery
          image: YOUR_REGISTRY/service-hub-notification-service:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "config.celery", "worker", "-l", "info", "-Q", "notification_service", "-c", "2"]
          envFrom:
            - configMapRef:
                name: service-hub-config
            - secretRef:
                name: service-hub-secrets
          env:
            - name: DB_NAME
              value: sh_notifications
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

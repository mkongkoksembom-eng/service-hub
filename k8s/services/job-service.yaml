apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: service-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
    spec:
      containers:
        - name: job-service
          image: YOUR_REGISTRY/service-hub-job-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8009
          envFrom:
            - configMapRef:
                name: service-hub-config
            - secretRef:
                name: service-hub-secrets
          env:
            - name: DB_NAME
              value: sh_jobs
            - name: JOB_NOTIFICATION_PROVIDER_LIMIT
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8009
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 8009
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: job-service
  namespace: service-hub
spec:
  selector:
    app: job-service
  ports:
    - port: 80
      targetPort: 8009
---
# Celery worker + Beat scheduler in one pod (single periodic task — acceptable at this scale)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service-celery
  namespace: service-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-service-celery
  template:
    metadata:
      labels:
        app: job-service-celery
    spec:
      containers:
        - name: celery
          image: YOUR_REGISTRY/service-hub-job-service:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "config.celery", "worker", "-B", "-l", "info", "-Q", "job_service", "-c", "1"]
          envFrom:
            - configMapRef:
                name: service-hub-config
            - secretRef:
                name: service-hub-secrets
          env:
            - name: DB_NAME
              value: sh_jobs
            - name: JOB_NOTIFICATION_PROVIDER_LIMIT
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

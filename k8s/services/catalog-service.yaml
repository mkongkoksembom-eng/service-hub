apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: service-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: YOUR_REGISTRY/service-hub-catalog-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: service-hub-config
            - secretRef:
                name: service-hub-secrets
          env:
            - name: DB_NAME
              value: sh_catalog
            - name: REDIS_CACHE_URL
              value: redis://redis:6379/2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: service-hub
spec:
  selector:
    app: catalog-service
  ports:
    - port: 80
      targetPort: 8002

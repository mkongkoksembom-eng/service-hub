# IMPORTANT: Replace every REPLACE_WITH_* value before applying.
# Never commit real secrets to git — add this file to .gitignore or use
# a secrets manager (Vault, AWS Secrets Manager, Sealed Secrets, etc.)
#
# Generate SECRET_KEY:
#   python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
# Generate INTERNAL_API_KEY:
#   python -c "import secrets; print(secrets.token_hex(32))"
apiVersion: v1
kind: Secret
metadata:
  name: service-hub-secrets
  namespace: service-hub
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_RANDOM_50_CHAR_SECRET"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  INTERNAL_API_KEY: "REPLACE_WITH_RANDOM_HEX_KEY"
  EMAIL_HOST_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"
